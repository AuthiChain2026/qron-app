name: Register Stripe Webhook

on:
  push:
    branches: [main]
    paths:
      - 'app/api/webhook/**'
      - 'scripts/register-stripe-webhook.ts'
  workflow_dispatch:

jobs:
  register:
    name: register-webhook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Register or verify webhook
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          QRON_URL: ${{ github.event.inputs.webhook_url || 'https://qron.space' }}
        run: |
          if [ -z "$STRIPE_SECRET_KEY" ]; then
            echo "STRIPE_SECRET_KEY not set — skipping"
            exit 0
          fi
          npx tsx scripts/register-stripe-webhook.ts || true
      - name: Summary
        run: |
          echo "### Stripe Webhook" >> $GITHUB_STEP_SUMMARY
          echo "Endpoint: https://qron.space/api/webhook" >> $GITHUB_STEP_SUMMARY
          echo "Secret already stored as STRIPE_WEBHOOK_SECRET in Vercel." >> $GITHUB_STEP_SUMMARY
