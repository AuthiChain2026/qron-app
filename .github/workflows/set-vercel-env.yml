name: Set Vercel Production Env Vars

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to confirm'
        required: true

jobs:
  set-env:
    name: Inject Vercel Production Env Vars
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      TEAM_ID: team_PKVRDwUXPRFjmGTM7PZxjNys
      PROJECT_ID: prj_jkFURGmAhmo0sUSZjNpRlc01SRL3
    steps:
      - name: Upsert STRIPE_WEBHOOK_SECRET
        run: |
          ENVS=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v9/projects/$PROJECT_ID/env?teamId=$TEAM_ID" || echo '{}') || echo '{}'
          ID=$(echo "$ENVS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(next((e['id'] for e in d.get('envs',[]) if e['key']=='STRIPE_WEBHOOK_SECRET'),''))" 2>/dev/null || true)
          if [ -n "$ID" ]; then
            curl -s -X PATCH -H "Authorization: Bearer $VERCEL_TOKEN" -H "Content-Type: application/json" "https://api.vercel.com/v9/projects/$PROJECT_ID/env/$ID?teamId=$TEAM_ID" -d '{"value":"${{ secrets.STRIPE_WEBHOOK_SECRET }}","type":"encrypted","target":["production","preview"]}' > /dev/null && echo "Updated STRIPE_WEBHOOK_SECRET"
          else
            curl -s -X POST -H "Authorization: Bearer $VERCEL_TOKEN" -H "Content-Type: application/json" "https://api.vercel.com/v9/projects/$PROJECT_ID/env?teamId=$TEAM_ID" -d '{"key":"STRIPE_WEBHOOK_SECRET","value":"${{ secrets.STRIPE_WEBHOOK_SECRET }}","type":"encrypted","target":["production","preview"]}' > /dev/null && echo "Created STRIPE_WEBHOOK_SECRET"
          fi

      - name: Upsert SUPABASE_SERVICE_ROLE_KEY
        run: |
          ENVS=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v9/projects/$PROJECT_ID/env?teamId=$TEAM_ID" || echo '{}') || echo '{}'
          ID=$(echo "$ENVS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(next((e['id'] for e in d.get('envs',[]) if e['key']=='SUPABASE_SERVICE_ROLE_KEY'),''))" 2>/dev/null || true)
          VAL="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          if [ -z "$VAL" ]; then VAL="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oZG5remh0YWRma2tsdWl1bGhzIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjUwNjY2MiwiZXhwIjoyMDg4MDgyNjYyfQ.eSMoNDPGFuFJIOEHfmR4LHGk73xnLiETlr9Q6YhNjY4"; fi
          if [ -n "$ID" ]; then
            curl -s -X PATCH -H "Authorization: Bearer $VERCEL_TOKEN" -H "Content-Type: application/json" "https://api.vercel.com/v9/projects/$PROJECT_ID/env/$ID?teamId=$TEAM_ID" -d "{"value":"$VAL","type":"encrypted","target":["production","preview"]}" > /dev/null && echo "Updated SUPABASE_SERVICE_ROLE_KEY"
          else
            curl -s -X POST -H "Authorization: Bearer $VERCEL_TOKEN" -H "Content-Type: application/json" "https://api.vercel.com/v9/projects/$PROJECT_ID/env?teamId=$TEAM_ID" -d "{"key":"SUPABASE_SERVICE_ROLE_KEY","value":"$VAL","type":"encrypted","target":["production","preview"]}" > /dev/null && echo "Created SUPABASE_SERVICE_ROLE_KEY"
          fi

      - name: Upsert NEXT_PUBLIC_SUPABASE_ANON_KEY
        run: |
          ENVS=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v9/projects/$PROJECT_ID/env?teamId=$TEAM_ID" || echo '{}') || echo '{}'
          ID=$(echo "$ENVS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(next((e['id'] for e in d.get('envs',[]) if e['key']=='NEXT_PUBLIC_SUPABASE_ANON_KEY'),''))" 2>/dev/null || true)
          VAL="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oZG5remh0YWRma2tsdWl1bGhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzgyNTUsImV4cCI6MjA4OTUxNDI1NX0.akaWgxRilnjavzpsLqU149nBJqxDjbYOnRdAqrwz4J8"
          if [ -n "$ID" ]; then
            curl -s -X PATCH -H "Authorization: Bearer $VERCEL_TOKEN" -H "Content-Type: application/json" "https://api.vercel.com/v9/projects/$PROJECT_ID/env/$ID?teamId=$TEAM_ID" -d "{"value":"$VAL","type":"encrypted","target":["production","preview"]}" > /dev/null && echo "Updated NEXT_PUBLIC_SUPABASE_ANON_KEY"
          else
            curl -s -X POST -H "Authorization: Bearer $VERCEL_TOKEN" -H "Content-Type: application/json" "https://api.vercel.com/v9/projects/$PROJECT_ID/env?teamId=$TEAM_ID" -d "{"key":"NEXT_PUBLIC_SUPABASE_ANON_KEY","value":"$VAL","type":"encrypted","target":["production","preview"]}" > /dev/null && echo "Created NEXT_PUBLIC_SUPABASE_ANON_KEY"
          fi

      - name: Summary
        run: |
          echo "### Vercel Env Vars Updated" >> $GITHUB_STEP_SUMMARY
          echo "All 3 env vars injected. Redeploy qron-app to activate." >> $GITHUB_STEP_SUMMARY
